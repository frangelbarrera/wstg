name: Deploy Latest Checklists

on:
  push:
    branches:
      - master
    paths:
      - 'document/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version?'
        required: false
        default: ''
jobs:
  create_pr:
    name: Update Checklists
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Setup Action
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        persist-credentials: false
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Setup Python
      uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
      with:
        python-version: "3.10"
    - name: Install Dependencies
      run: |
        pip install openpyxl
    - name: Generate JSON Checklist
      run: |
        python3 ./.github/json/scripts/generate_checklist_json.py
        git update-index -q --refresh
        if ! git diff-index --quiet HEAD --; then
          echo "CHANGED=true" >> "$GITHUB_ENV"
        fi
    - name: Run XLSX Build
      if: env.CHANGED == 'true'
      run: python3 ./.github/xlsx/scripts/build-checklist.py
    - name: Commit Checklists
      if: env.CHANGED == 'true'
      run: |
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/frangelbarrera/wstg.git"
        git add checklists/
        git commit -m "Update checklists automatically" -m "Generated from commit ${{ github.sha }}"
        git push origin master
